<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sebastian's Library</title>
    <link rel="stylesheet" href="./styles/style.css">
    <link rel="stylesheet" href="./font.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
        rel="stylesheet">
</head>

<body>

    <header>
        <img src="./images/book.png" alt="Library icon" height="50px">
        <span>Sebastian's Library</span>
    </header>

    <div id="grid-container">
        <div>
            <button id="add">Add Book</button>
        </div>
    </div>

    <form action="">


        <div id="author">
            <label for="author">Author</label> <br>
            <input type="text" name="author" id="book-author" required>
        </div>


        <div id="title">
            <label for="title">Title</label> <br>
            <input type="text" name="title" id="book-title" required>
        </div>

        <div id="price">
            <label for="price">Book Price</label> <br>
            <input type="text" name="price" id="book-price">
        </div>

        <div id="pages">
            <label for="pages">Number Of Pages</label> <br>
            <input type="text" name="pages" id="num-pages" required>
        </div>


        <div id="publised">
            <label for="release-date">Date Published</label> <br>
            <input type="date" name="release-date" id="release-date">
        </div>


        <fieldset id="status">
            <label for="book-status">Has the book been read?</label>

            <div id="options">

                <div>
                    <input type="radio" name="yes" id="yes" value="Yes">
                    <label for="yes">Yes</label>
                </div>

                <div>
                    <input type="radio" name="no" id="no" value="No">
                    <label for="no">No</label>
                </div>
            </div>
        </fieldset>



    </form>

</body>
<script src="./scripts/library.js"></script>

</html>
